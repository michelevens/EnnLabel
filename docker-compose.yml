version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ennlabel-app
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    networks:
      - ennlabel
    depends_on:
      - db
      - redis
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-ennlabel}
      - DB_USERNAME=${DB_USERNAME:-ennlabel}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  nginx:
    image: nginx:1.25-alpine
    container_name: ennlabel-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ennlabel
    depends_on:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ennlabel-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
    networks:
      - ennlabel
    depends_on:
      - nginx
    environment:
      - NEXT_PUBLIC_API_URL=http://nginx:80/api

  db:
    image: postgres:16-alpine
    container_name: ennlabel-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ennlabel}
      POSTGRES_USER: ${DB_USERNAME:-ennlabel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ennlabel

  redis:
    image: redis:7-alpine
    container_name: ennlabel-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - ennlabel

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ennlabel-queue
    restart: unless-stopped
    working_dir: /var/www/backend
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www/backend
    networks:
      - ennlabel
    depends_on:
      - app
      - redis

networks:
  ennlabel:
    driver: bridge

volumes:
  pgdata:
    driver: local
